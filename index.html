<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrabble Word Whiz - CSW24 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Lexend:wght@700;900&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            color: #374151; 
            overflow: hidden; 
        }
        
        .heading-font { font-family: 'Lexend', sans-serif; }

        .app-container { width: 100%; height: 100dvh; background: #fafafa; }
        @media (min-width: 500px) {
            .app-container { 
                width: min(450px, calc(92dvh * 9 / 16)); 
                height: min(800px, 92dvh); 
                border-radius: 2.5rem; 
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 12px #ffffff, 0 0 0 16px #cbd5e1; 
            }
        }

        /* Fun Tactile Tiles */
        .scrabble-tile { 
            display: inline-flex; align-items: center; justify-content: center; 
            width: 56px; height: 56px; background: #fcd34d; 
            border-radius: 12px; border-bottom: 6px solid #fbbf24; 
            font-weight: 900; font-size: 1.8rem; text-transform: uppercase; 
            color: #4338ca;
            position: relative; 
            font-family: 'Lexend', sans-serif;
            transition: all 0.1s;
        }
        .scrabble-tile.used { 
            background-color: #e5e7eb !important; border-bottom-color: #d1d5db !important; 
            color: #9ca3af !important; transform: translateY(2px); border-bottom-width: 4px;
        }
        .tile-value { position: absolute; bottom: 3px; right: 5px; font-size: 0.65rem; font-family: 'Nunito', sans-serif; font-weight: 800; color: inherit; }
        
        /* Cuter 3D Buttons */
        .btn-3d {
            transition: all 0.1s; border-bottom-width: 6px;
        }
        .btn-3d:active {
            transform: translateY(4px); border-bottom-width: 2px; margin-bottom: 4px;
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(3px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-5px, 0, 0); } 40%, 60% { transform: translate3d(5px, 0, 0); } }
        
        .found-word-tag { background: #d1fae5; color: #047857; border: 2px solid #34d399; padding: 4px 12px; border-radius: 99px; font-size: 0.85rem; font-weight: 800; display: inline-block; margin: 3px; text-transform: uppercase; box-shadow: 0 2px 0 #34d399; }
        .missing-word-tag { background: #fee2e2; color: #b91c1c; border: 2px solid #f87171; padding: 4px 12px; border-radius: 99px; font-size: 0.85rem; font-weight: 800; display: inline-block; margin: 3px; text-transform: uppercase; box-shadow: 0 2px 0 #f87171;}
        
        .timer-bar-transition { transition: width 1s linear, background-color 0.3s ease; }
        
        /* Custom scrollbar */
        .screen-scroll::-webkit-scrollbar { width: 8px; }
        .screen-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 99px; }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center sm:p-4">

    <div id="app" class="app-container overflow-hidden relative flex flex-col">
        <!-- Header -->
        <div class="bg-indigo-500 p-4 text-white text-center flex-shrink-0 z-10 border-b-4 border-indigo-600">
            <h1 class="text-2xl font-black flex items-center justify-center gap-2 heading-font tracking-wide">
                <span class="text-3xl drop-shadow-md">🔠</span> Scrabble Whiz
            </h1>
            <p class="text-indigo-100 text-[10px] uppercase font-black tracking-widest mt-1">CSW24 Edition</p>
        </div>

        <!-- Welcome Screen -->
        <div id="welcome-screen" class="p-6 flex-1 flex flex-col justify-center items-center bg-indigo-50/50">
            <div class="relative w-40 h-40 bg-[#fcd34d] rounded-3xl border-b-8 border-[#fbbf24] shadow-xl flex items-center justify-center mb-8 transform -rotate-6 hover:rotate-0 transition-transform duration-300">
                <span class="text-8xl font-black text-indigo-900 heading-font">W</span>
                <span class="absolute bottom-3 right-4 text-3xl font-black text-indigo-900">4</span>
            </div>
            
            <div class="w-full max-w-sm mb-8 space-y-3">
                <label class="block text-center text-indigo-400 font-black uppercase tracking-widest text-sm">Who's Playing?</label>
                <input type="text" id="player-name-input" class="w-full p-4 border-4 border-indigo-100 rounded-3xl text-center text-2xl font-black text-indigo-800 placeholder-indigo-300 focus:border-indigo-400 focus:outline-none transition-colors shadow-inner" placeholder="Your Name" autocomplete="off">
            </div>

            <button onclick="goToSetup()" class="btn-3d w-full max-w-sm bg-emerald-400 border-emerald-500 text-white py-5 rounded-3xl font-black text-2xl shadow-lg flex justify-center items-center gap-2">
                Let's Play! <span class="text-3xl">🚀</span>
            </button>
        </div>

        <!-- Setup Screen -->
        <div id="setup-screen" class="p-5 flex-1 flex flex-col hidden screen-scroll overflow-y-auto bg-gray-50">
            
            <div class="flex items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border-2 border-gray-100 mb-6">
                <div class="bg-indigo-100 text-2xl p-2 rounded-xl">👋</div>
                <div>
                    <div class="text-[10px] text-gray-400 font-black uppercase tracking-widest leading-none">Welcome back,</div>
                    <div id="setup-player-name" class="font-black text-indigo-800 text-lg leading-none mt-1">Player</div>
                </div>
            </div>

            <div id="main-category-section">
                <h3 class="text-gray-400 text-xs font-black mb-3 uppercase tracking-widest text-center">Choose Your Challenge</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectCategory('2', '2 Letters')" class="btn-3d bg-white border-2 border-gray-200 border-b-6 border-b-gray-300 p-6 rounded-[2rem] text-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-200 flex flex-col items-center justify-center aspect-square shadow-sm">
                        <div class="text-6xl mb-3 drop-shadow-sm">✌️</div>
                        <div class="font-black text-gray-700 text-lg">2 Letters</div>
                    </button>
                    <button onclick="selectCategory('3', '3 Letters')" class="btn-3d bg-white border-2 border-gray-200 border-b-6 border-b-gray-300 p-6 rounded-[2rem] text-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-200 flex flex-col items-center justify-center aspect-square shadow-sm">
                        <div class="text-6xl mb-3 drop-shadow-sm">🤟</div>
                        <div class="font-black text-gray-700 text-lg">3 Letters</div>
                    </button>
                    <button onclick="selectCategory('4', '4 Letters')" class="btn-3d bg-white border-2 border-gray-200 border-b-6 border-b-gray-300 p-6 rounded-[2rem] text-center cursor-pointer hover:bg-indigo-50 hover:border-indigo-200 flex flex-col items-center justify-center aspect-square shadow-sm">
                        <div class="text-6xl mb-3 drop-shadow-sm">🖖</div>
                        <div class="font-black text-gray-700 text-lg">4 Letters</div>
                    </button>
                    <button onclick="selectCategory('Bingo', 'Bingo Stems')" class="btn-3d bg-white border-2 border-gray-200 border-b-6 border-b-gray-300 p-6 rounded-[2rem] text-center cursor-pointer hover:bg-amber-50 hover:border-amber-200 flex flex-col items-center justify-center aspect-square shadow-sm">
                        <div class="text-6xl mb-3 drop-shadow-sm">🎰</div>
                        <div class="font-black text-amber-600 text-lg">Bingo</div>
                    </button>
                </div>
            </div>

            <div id="sub-category-section" class="hidden flex-1 flex flex-col">
                <button onclick="backToCategories()" class="text-gray-400 hover:text-indigo-600 font-black mb-6 flex items-center gap-2 text-sm uppercase tracking-wider transition-colors w-fit"><span class="text-xl">⬅️</span> Go Back</button>
                
                <div class="bg-white border-2 border-indigo-100 p-6 rounded-3xl mb-6 shadow-sm">
                    <label id="selected-cat-name" class="block text-indigo-400 font-black mb-3 uppercase tracking-widest text-xs text-center"></label>
                    <select id="subcat-select" class="w-full p-4 border-2 border-gray-100 rounded-2xl font-black text-lg bg-gray-50 text-indigo-900 focus:border-indigo-400 outline-none cursor-pointer"></select>
                </div>
                
                <button onclick="startGame()" class="btn-3d w-full bg-indigo-500 border-indigo-600 text-white py-5 rounded-3xl font-black text-2xl mt-auto shadow-md">
                    Start Game 🎯
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="p-4 flex-1 flex flex-col hidden relative bg-gray-50">
            <div id="pause-overlay" class="absolute inset-0 bg-rose-500/90 backdrop-blur-sm z-40 hidden flex-col items-center justify-center text-white rounded-b-3xl">
                <span class="text-8xl mb-4 drop-shadow-lg">⏸️</span>
                <span class="text-4xl font-black tracking-widest heading-font">PAUSED</span>
            </div>
            
            <!-- Cute Top Bar -->
            <div class="flex justify-between items-center mb-4 bg-white p-3 rounded-3xl shadow-sm border-2 border-gray-100">
                <div class="flex items-center gap-2 max-w-[50%]">
                    <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-xl shadow-inner">👤</div>
                    <div class="truncate font-black text-indigo-900 text-sm" id="game-player-name">Player</div>
                </div>
                <div class="text-right">
                    <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest leading-none">Score</div>
                    <div id="score" class="text-indigo-600 text-3xl font-black heading-font leading-none mt-1">0</div>
                </div>
            </div>
            
            <div class="flex justify-between items-end mb-2 px-2">
                <button onclick="exitToHome()" class="text-gray-400 hover:text-rose-500 font-black text-xs uppercase tracking-widest transition-colors">🏠 Exit</button>
                <div id="progress-display" class="text-indigo-400 text-sm font-black uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full">0 / 0</div>
                <button onclick="togglePause()" class="text-gray-400 hover:text-indigo-500 font-black text-xs uppercase tracking-widest transition-colors">⏸️ Pause</button>
            </div>
            
            <div class="w-full bg-gray-200 h-3 rounded-full mb-6 overflow-hidden shadow-inner border border-gray-100">
                <div id="timer-bar" class="bg-gradient-to-r from-indigo-400 to-indigo-600 h-full w-full timer-bar-transition rounded-full"></div>
            </div>
            
            <div id="found-words-list" class="flex flex-wrap justify-center content-center min-h-[50px] mb-4"></div>
            
            <div class="flex-1 flex flex-col justify-center mb-4">
                <div id="tile-display" class="flex flex-wrap justify-center gap-2 mb-6"></div>
                <input type="text" id="answer-input" class="w-full max-w-[250px] mx-auto text-center text-3xl font-black uppercase tracking-widest outline-none border-b-4 border-gray-300 focus:border-indigo-500 pb-2 bg-transparent text-indigo-900 placeholder-gray-300" autocomplete="off" placeholder="____">
                <div id="feedback" class="text-center h-6 mt-3 font-black text-sm uppercase tracking-wide"></div>
            </div>
            
            <div class="grid grid-cols-4 gap-3 mt-auto">
                <button onclick="checkAnswer()" class="btn-3d col-span-2 bg-emerald-400 border-emerald-500 text-white font-black py-4 rounded-3xl shadow-sm text-xl tracking-wider">SUBMIT</button>
                <button onclick="useHint()" class="btn-3d col-span-1 bg-amber-400 border-amber-500 text-white py-4 rounded-3xl shadow-sm text-3xl flex items-center justify-center">💡</button>
                <button onclick="skipWord()" class="btn-3d col-span-1 bg-gray-300 border-gray-400 text-gray-600 py-4 rounded-3xl shadow-sm text-3xl flex items-center justify-center">⏭️</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="p-6 text-center flex-1 flex flex-col justify-center hidden bg-indigo-50/50">
            <div class="text-8xl mb-2 animate-bounce drop-shadow-xl">🎉</div>
            <h2 class="text-3xl font-black text-gray-800 mb-1 heading-font">Great Job,</h2>
            <h3 id="result-player-name" class="text-4xl font-black text-indigo-600 mb-8 heading-font">Player!</h3>
            
            <div class="grid grid-cols-3 gap-3 mb-8">
                <div class="bg-white border-2 border-indigo-100 p-4 rounded-3xl shadow-sm flex flex-col justify-center">
                    <div class="text-[10px] font-black text-indigo-400 tracking-widest uppercase mb-1">Score</div>
                    <div id="final-score" class="text-3xl font-black text-indigo-600 heading-font">0</div>
                </div>
                <div class="bg-white border-2 border-emerald-100 p-4 rounded-3xl shadow-sm flex flex-col justify-center">
                    <div class="text-[10px] font-black text-emerald-400 tracking-widest uppercase mb-1">Sets</div>
                    <div id="final-solved" class="text-3xl font-black text-emerald-500 heading-font">0</div>
                </div>
                <div class="bg-white border-2 border-amber-100 p-4 rounded-3xl shadow-sm flex flex-col justify-center">
                    <div class="text-[10px] font-black text-amber-400 tracking-widest uppercase mb-1">Accuracy</div>
                    <div id="final-accuracy" class="text-3xl font-black text-amber-500 heading-font">0%</div>
                </div>
            </div>
            
            <div class="mt-auto space-y-3">
                <button onclick="showStudySheet()" id="study-sheet-btn" class="btn-3d w-full bg-amber-100 border-amber-300 text-amber-700 py-4 rounded-3xl font-black hidden shadow-sm text-lg flex items-center justify-center gap-2">
                    <span class="text-2xl">📖</span> Review Study Sheet
                </button>
                <button onclick="resetApp()" class="btn-3d w-full bg-indigo-500 border-indigo-600 text-white py-4 rounded-3xl font-black shadow-sm text-xl flex items-center justify-center gap-2">
                    <span class="text-2xl">🏠</span> Play Again
                </button>
            </div>
        </div>

        <!-- Study Modal -->
        <div id="study-modal" class="absolute inset-0 bg-gray-50 z-50 hidden flex flex-col p-6 overflow-y-auto screen-scroll rounded-b-3xl">
            <div class="flex justify-between items-center mb-6 border-b-2 border-gray-200 pb-4 bg-gray-50 sticky top-0 z-10 pt-2">
                <h2 class="text-2xl font-black text-indigo-900 flex items-center gap-2 heading-font"><span class="text-3xl">📚</span> Missed Words</h2>
                <button onclick="closeStudySheet()" class="text-4xl text-gray-400 hover:text-rose-500 transition-colors bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-sm border border-gray-100">&times;</button>
            </div>
            <div id="study-content" class="space-y-4 pb-10"></div>
        </div>
    </div>

            "Bingo": {
                "TISANE": ["ENTASIA","TAENIAS","BANTIES","BASINET","BESAINT","BESTAIN","ACETINS","CANIEST","CINEAST","DESTAIN","DETAINS","INSTEAD","NIDATES","SAINTED","SATINED","STAINED"],
                "SATIRE": ["ARISTAE","ASTERIA","ATRESIA","BAITERS","BARITES","REBAITS","TERBIAS","ATRESIC","CRISTAE","RACIEST","STEARIC"],
                "RETINA": ["ATEBRIN","CANTIER","CERATIN","CERTAIN","CREATIN","CRINATE","NACRITE","TACRINE","ANTIRED","DETRAIN","TRAINED","ARENITE","RETINAE","TRAINEE","FAINTER","FENITAR","GRANITE","GRATINE","INGRATE","TANGIER","TEARING","HAIRNET","INEARTH","THERIAN","INERTIA","JANTIER","NARTJIE","KERATIN","ENTRAIL","LATRINE","RATLINE","RELIANT","RETINAL","TRENAIL","MERANTI","MINARET","RAIMENT","ENTRAIN","TRANNIE","OTARINE","INAPTER","PAINTER","PERTAIN","REPAINT","TERRAIN","TRAINER","ANESTRI","ANTSIER","NASTIER","RATINES","RESIANT","RETAINS","RETINAS","RETSINA","STAINER","STARNIE","STEARIN","INTREAT","ITERANT","NATTIER","NITRATE","TARTINE","TERTIAN","RUINATE","TAURINE","URANITE","URINATE","TAWNIER","TINWARE"]
            }
        };

        const scrabblePoints = { A:1, B:3, C:3, D:2, E:1, F:4, G:2, H:4, I:1, J:8, K:5, L:1, M:3, N:1, O:1, P:3, Q:10, R:1, S:1, T:1, U:1, V:4, W:4, X:8, Y:4, Z:10 };

        let currentCategory = '2', wordListPool = [], allAnagrams = [], foundWords = [], score = 0, streak = 0, solvedTileSets = 0, isPaused = false, isRevealedMode = false, playerName = "Player", timerInterval = null, timeLeft = 10, maxTime = 12, sessionHistory = [], currentBaseWord = "";

        function showScreen(key) { 
            document.querySelectorAll('#app > div:not(.bg-indigo-500)').forEach(s => s.classList.add('hidden')); 
            document.getElementById(key + '-screen').classList.remove('hidden'); 
        }

        function goToWelcome() { showScreen('welcome'); }

        function updatePlayerNameDisplays() {
            const name = playerName || "Player";
            document.getElementById('setup-player-name').innerText = name;
            document.getElementById('game-player-name').innerText = name;
            document.getElementById('result-player-name').innerText = name + "!";
        }

        function goToSetup() { 
            playerName = document.getElementById('player-name-input').value.trim() || "Player"; 
            updatePlayerNameDisplays();
            showScreen('setup'); 
        }

        function backToCategories() { 
            document.getElementById('main-category-section').classList.remove('hidden'); 
            document.getElementById('sub-category-section').classList.add('hidden'); 
        }

        function selectCategory(cat, name) {
            currentCategory = cat;
            document.getElementById('main-category-section').classList.add('hidden');
            document.getElementById('sub-category-section').classList.remove('hidden');
            document.getElementById('selected-cat-name').innerText = name;
            const select = document.getElementById('subcat-select'), words = CSW24[cat];
            select.innerHTML = '';
            
            if (cat === 'Bingo') {
                Object.keys(CSW24.Bingo).forEach(stem => { const opt = document.createElement('option'); opt.value = stem; opt.innerText = stem; select.appendChild(opt); });
            } else {
                const newAdditions = { "3": ["UWU","PWN","VOG","VOM","YEZ","XED","VAG","UMU","TAI","QIN"], "4": ["CHIZ","YEET","MPOX","VOMS","VAXX","VLOG","VOIP","WAQF","YAGE","ZEXE"] };
                let html = `<option value="All">All (${words.length})</option>`;
                if (newAdditions[cat]) html += `<option value="CSW24">✨ CSW24 New</option>`;
                html += `<option value="Heavy">Heavy (J,Q,X,Z)</option>`;
                const counts = {}; words.forEach(w => counts[w[0]] = (counts[w[0]] || 0) + 1);
                Object.keys(counts).sort().forEach(l => { html += `<option value="${l}">${l} (${counts[l]})</option>`; });
                select.innerHTML = html;
            }
        }

        function getWordSelection() {
            const sub = document.getElementById('subcat-select').value, all = CSW24[currentCategory];
            if (currentCategory === 'Bingo') return [...CSW24.Bingo[sub]];
            if (sub === 'CSW24') { 
                const list = { "3": ["UWU","PWN","VOG","VOM","YEZ","XED","VAG","UMU","TAI","QIN"], "4": ["CHIZ","YEET","MPOX","VOMS","VAXX","VLOG","VOIP","WAQF","YAGE","ZEXE"] };
                return all.filter(w => list[currentCategory].includes(w));
            }
            if (sub === 'All') return [...all];
            if (sub === 'Heavy') return all.filter(w => /[JQXZ]/.test(w));
            return all.filter(w => w[0] === sub);
        }

        function startGame() { 
            wordListPool = getWordSelection(); 
            score = 0; streak = 0; solvedTileSets = 0; sessionHistory = []; 
            showScreen('game'); 
            nextWord(); 
        }

        function nextWord() {
            if (currentBaseWord) sessionHistory.push({ rack: currentBaseWord.split('').sort().join(''), all: [...allAnagrams], found: [...foundWords] });
            if (wordListPool.length === 0) return endGame();
            
            const idx = Math.floor(Math.random() * wordListPool.length);
            currentBaseWord = wordListPool.splice(idx, 1)[0];
            const master = (currentCategory === 'Bingo') ? CSW24.Bingo[document.getElementById('subcat-select').value] : CSW24[currentCategory];
            
            allAnagrams = master.filter(w => w.split('').sort().join('') === currentBaseWord.split('').sort().join(''));
            allAnagrams = [...new Set(allAnagrams)];

            foundWords = []; isRevealedMode = false;
            renderTiles(currentBaseWord); renderFoundWords(); updateUI(); startTimer();
            
            document.getElementById('answer-input').value = ''; 
            document.getElementById('answer-input').disabled = false; 
            document.getElementById('answer-input').focus(); 
            document.getElementById('feedback').innerText = '';
        }

        function renderTiles(word) {
            const container = document.getElementById('tile-display'); container.innerHTML = '';
            word.split('').sort(() => Math.random() - 0.5).forEach(char => {
                const div = document.createElement('div'); div.className = 'scrabble-tile shadow-sm'; div.dataset.letter = char;
                div.innerHTML = `${char}<span class="tile-value">${scrabblePoints[char]||0}</span>`; container.appendChild(div);
            });
        }

        function renderFoundWords() {
            const container = document.getElementById('found-words-list'); container.innerHTML = '';
            allAnagrams.forEach(w => {
                const span = document.createElement('span');
                if (foundWords.includes(w)) { span.className = 'found-word-tag'; span.innerText = w; }
                else if (isRevealedMode) { span.className = 'missing-word-tag'; span.innerText = w; }
                else { span.className = 'inline-block px-4 py-1.5 m-1 bg-white border-2 border-gray-200 rounded-full text-[12px] text-gray-300 font-black shadow-sm'; span.innerText = '?'.repeat(w.length); }
                container.appendChild(span);
            });
        }

        function updateTileColors() {
            const input = document.getElementById('answer-input');
            if (!input) return;
            const typed = input.value.toUpperCase().split('');
            const tiles = Array.from(document.querySelectorAll('#tile-display .scrabble-tile'));
            
            tiles.forEach(t => t.classList.remove('used'));
            typed.forEach(char => {
                const availableTile = tiles.find(t => t.dataset.letter === char && !t.classList.contains('used'));
                if (availableTile) availableTile.classList.add('used');
            });
        }

        function checkAnswer() {
            if (isPaused) return;
            const input = document.getElementById('answer-input'), val = input.value.toUpperCase().trim(), fb = document.getElementById('feedback');
            if (allAnagrams.includes(val) && !foundWords.includes(val)) {
                streak++;
                
                // Calculate word score based on actual Scrabble letter values
                let wordScore = val.split('').reduce((sum, char) => sum + (scrabblePoints[char] || 0), 0);
                let earned = wordScore * streak;
                
                foundWords.push(val); score += earned; 
                fb.innerText = `Nice! +${earned}` + (streak > 1 ? ` (${streak}x Streak!)` : ""); 
                fb.className = "text-emerald-500 font-black";
                input.value = ''; renderFoundWords(); updateUI(); updateTileColors();
                
                if (foundWords.length === allAnagrams.length) { 
                    solvedTileSets++; 
                    clearInterval(timerInterval); 
                    setTimeout(nextWord, 1000); 
                } else {
                    startTimer(); // Reset timer when a word is answered correctly!
                }
            } else {
                streak = 0;
                score = Math.max(0, score - 2); 
                fb.innerText = "Nope! -2 pts (Streak lost)"; fb.className = "text-rose-500 font-black";
                input.parentElement.classList.add('shake'); setTimeout(() => input.parentElement.classList.remove('shake'), 500);
                updateUI();
            }
        }

        function startTimer() {
            clearInterval(timerInterval); 
            // 20 seconds flat for the entire Bingo round, 15s for 4-letter, 12s for everything else
            maxTime = currentCategory === 'Bingo' ? 20 : (currentCategory === '4' ? 15 : 12);
            timeLeft = maxTime; 
            
            // Snap the timer bar back to full without animation delay
            const timerBar = document.getElementById('timer-bar');
            timerBar.classList.remove('timer-bar-transition');
            timerBar.style.width = '100%';
            
            // Restore animation class
            setTimeout(() => {
                timerBar.classList.add('timer-bar-transition');
            }, 20);

            timerInterval = setInterval(() => { 
                if (!isPaused) { 
                    timeLeft--; 
                    updateTimerUI(); 
                    if (timeLeft <= 0) { 
                        clearInterval(timerInterval); 
                        revealAnswers(); 
                    } 
                } 
            }, 1000);
        }

        function updateTimerUI() { document.getElementById('timer-bar').style.width = (timeLeft / maxTime * 100) + '%'; }

        function revealAnswers() { isRevealedMode = true; streak = 0; renderFoundWords(); document.getElementById('answer-input').disabled = true; setTimeout(nextWord, 3000); }
        function togglePause() { isPaused = !isPaused; document.getElementById('pause-overlay').classList.toggle('hidden', !isPaused); }
        
        function exitToHome() { 
            clearInterval(timerInterval); 
            if (currentBaseWord) {
                sessionHistory.push({ rack: currentBaseWord.split('').sort().join(''), all: [...allAnagrams], found: [...foundWords] });
                currentBaseWord = ""; 
            }
            endGame(); 
        }

        function updateUI() { 
            document.getElementById('score').innerText = score; 
            document.getElementById('progress-display').innerText = `${foundWords.length} / ${allAnagrams.length}`; 
        }

        function endGame() {
            clearInterval(timerInterval); 
            
            // A don ad sef-chek ya so di kod no go kresh (Added safety checks to prevent crashes)
            if (document.getElementById('final-score')) document.getElementById('final-score').innerText = score; 
            if (document.getElementById('final-solved')) document.getElementById('final-solved').innerText = solvedTileSets;
            
            let totalT = 0, totalF = 0;
            sessionHistory.forEach(i => { totalT += i.all.length; totalF += i.found.length; });
            if (document.getElementById('final-accuracy')) document.getElementById('final-accuracy').innerText = (totalT > 0 ? Math.round((totalF / totalT) * 100) : 0) + '%';

            if (sessionHistory.length > 0) document.getElementById('study-sheet-btn').classList.remove('hidden');
            showScreen('result');
        }

        function showStudySheet() {
            const content = document.getElementById('study-content'); content.innerHTML = '';
            sessionHistory.forEach(item => {
                const div = document.createElement('div'); div.className = "bg-white p-4 rounded-2xl shadow-sm border-2 border-gray-100";
                div.innerHTML = `<div class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-2">Tiles: ${item.rack}</div><div class="flex flex-wrap gap-2">${item.all.map(w => `<span class="${item.found.includes(w) ? 'text-emerald-500' : 'text-rose-500 underline'} font-black text-lg">${w}</span>`).join('')}</div>`;
                content.appendChild(div);
            });
            document.getElementById('study-modal').classList.remove('hidden');
        }

        function closeStudySheet() { document.getElementById('study-modal').classList.add('hidden'); }
        function resetApp() { goToSetup(); backToCategories(); }
        function skipWord() { clearInterval(timerInterval); streak = 0; score = Math.max(0, score - 2); updateUI(); revealAnswers(); }
        function useHint() { const m = allAnagrams.find(w => !foundWords.includes(w)); if (m) { document.getElementById('answer-input').value = m[0]; streak = 0; score = Math.max(0, score - 2); updateUI(); updateTileColors(); } }
        
        document.getElementById('answer-input').addEventListener('input', updateTileColors);
        document.getElementById('answer-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkAnswer(); });
        window.onload = () => showScreen('welcome');
    </script>
